<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Filter UI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/search.css"/>
</head>
<body>

<div class="panel">

  <!-- Search -->
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Item Name" autocomplete="off"/>
  </div>

  <!-- Filter toggle -->
  <button class="filter-toggle" id="filterToggle" aria-expanded="false">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
    </svg>
    Filter
  </button>

  <!-- Filter fields -->
  <div class="filter-fields" id="filterFields">

    <div class="field-row">
      <span class="field-label">Category:</span>
      <div class="select-wrap">
        <select class="field-select" id="category">
          <option value="" disabled selected hidden>Dropdown</option>
          <option>Electronics</option>
          <option>Clothing</option>
          <option>Furniture</option>
          <option>Books</option>
          <option>Food & Beverage</option>
        </select>
      </div>
    </div>

    <div class="field-row">
      <span class="field-label">Status:</span>
      <div class="select-wrap">
        <select class="field-select" id="status">
          <option value="" disabled selected hidden>Dropdown</option>
          <option>Active</option>
          <option>Inactive</option>
          <option>Pending</option>
          <option>Archived</option>
        </select>
      </div>
    </div>

    <div class="field-row">
      <span class="field-label">Location:</span>
      <input type="text" class="field-input" id="location" placeholder="Type"/>
    </div>

    <div class="field-row">
      <span class="field-label">Date:</span>
      <input type="date" class="field-input" id="date"/>
    </div>

    <div class="field-row">
      <span class="field-label">Color:</span>
      <div class="select-wrap">
        <select class="field-select" id="color">
          <option value="" disabled selected hidden>Dropdown</option>
          <option>Red</option>
          <option>Blue</option>
          <option>Green</option>
          <option>Black</option>
          <option>White</option>
          <option>Yellow</option>
        </select>
      </div>
    </div>

  </div>

  <div class="divider" id="divider"></div>

  <!-- Actions -->
  <div class="actions" id="actions">
    <button class="btn btn-apply" id="applyBtn">Apply Filter</button>
    <button class="btn btn-clear" id="clearBtn">Clear Filter</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="../js/search.js"></script>
</body>
</html>
