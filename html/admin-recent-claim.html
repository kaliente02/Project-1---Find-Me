<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FINDME | Recent Claims</title>
    <link rel="stylesheet" href="../css/recent-claim.css">
</head>
<body>

<header class="navbar">
    <div class="logo-section">
        <div class="logo-circle">
            <img src="../assets/images/logo.jpg" alt="Logo">
        </div>
        <h1 class="logo-text">FINDME</h1>
    </div>

    <div class="nav-icons">
        <span class="notification">🔔</span>
        <img src="../assets/images/profile.jpg" class="profile-icon" id="profileBtn">
    </div>
</header>

<div class="main-container">

    <!-- ACTIONS -->
    <div class="action-row">
        <div class="left-actions">
            <button id="reportLostBtn" class="primary-btn">Report Lost Item</button>
            <button id="reportFoundBtn" class="primary-btn">Report Found Item</button>
        </div>

        <div class="search-filter">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search">
            </div>
            <button id="filterBtn">Filter</button>
        </div>
    </div>

    <!-- ✅ FILTER PANEL (REQUIRED FOR YOUR JS) -->
    <div class="filter-panel" id="filterPanel">
        <div class="filter-panel-inner">

            <div class="filter-grid">

                <!-- STATUS -->
                <div class="filter-field">
                    <label for="filterStatus">Status</label>
                    <select id="filterStatus">
                        <option value="">All Status</option>
                        <option>Pending</option>
                        <option>Approved</option>
                        <option>Rejected</option>
                    </select>
                </div>

                <!-- FULL NAME -->
                <div class="filter-field">
                    <label for="filterName">Full Name</label>
                    <input type="text" id="filterName" placeholder="Enter name…">
                </div>

                <!-- ITEM NAME -->
                <div class="filter-field">
                    <label for="filterItem">Item Name</label>
                    <input type="text" id="filterItem" placeholder="Enter item…">
                </div>

                <!-- LOCATION -->
                <div class="filter-field">
                    <label for="filterLocation">Location</label>
                    <input type="text" id="filterLocation" placeholder="Enter location…">
                </div>

                <!-- DATE -->
                <div class="filter-field">
                    <label for="filterDate">Date Lost</label>
                    <input type="date" id="filterDate">
                </div>

            </div>

            <!-- ACTION BUTTONS -->
            <div class="filter-actions">
                <button class="btn-apply" id="applyFilterBtn">Apply Filter</button>
                <button class="btn-clear" id="clearFilterBtn">Clear</button>
            </div>

        </div>
    </div>

    <h2 class="section-title">Recent Claim Request</h2>

    <!-- ITEMS -->
    <div id="itemsContainer"></div>

</div>

<!-- ✅ TOAST (REQUIRED) -->
<div class="filter-toast" id="filterToast"></div>

<!-- MODAL -->
<div id="claimModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <button class="modal-close" id="modalClose">&times;</button>
        <div class="modal-content">
            <div class="modal-image-wrap">
                <img id="modalImage" src="" alt="Item Image">
            </div>
            <div class="modal-details">
                <h2 class="modal-title">Claim Request Details</h2>
                <div id="modalBody"></div>
            </div>
        </div>
    </div>
</div>

<script src="../js/admin-recent-claim.js"></script>
</body>
</html>
