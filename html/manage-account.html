<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/manage-account.css">
    <script type="module" src="../js/manage-account.js"></script>
</head>
<body>

<div class="account-container">
    <h1>Account <span>Settings</span></h1>

    <div class="account-content">

        <!-- LEFT: PROFILE IMAGE -->
        <div class="profile-section">
            <div class="avatar-wrapper" onclick="document.getElementById('imageInput').click()">
                <img id="profileImage" src="https://ui-avatars.com/api/?name=Juan+Dela+Cruz&background=2563eb&color=fff&size=160" alt="Profile Picture">
                <div class="avatar-overlay">Change</div>
            </div>
            <input type="file" id="imageInput" accept="image/*" hidden>
            <p class="profile-name" id="displayName">Edit Name</p>
            <span class="profile-role-badge" id="displayRole">User</span>
            <button id="editProfileBtn">Edit Profile</button>
        </div>

        <!-- VERTICAL DIVIDER -->
        <div class="divider"></div>

        <!-- RIGHT: ACCOUNT DETAILS -->
        <div class="details-section">
            <div class="fields-grid">

                <div class="field">
                    <label>Full Name</label>
                    <input type="text" id="fullName">
                </div>

                <div class="field">
                    <label>Role</label>
                    <input type="text" id="role" disabled>
                </div>

                <div class="field">
                    <label>Email Address</label>
                    <input type="email" id="email">
                </div>

                <div class="field">
                    <label>ID Number</label>
                    <input type="text" id="idNumber">
                </div>

                <div class="field full-width">
                    <label>Contact Number</label>
                    <input type="text" id="contactNumber">
                </div>

                <div class="field full-width">
                <label>Change Password</label>

                <input type="password" id="currentPassword" placeholder="Current Password">
                <input type="password" id="newPassword" placeholder="New Password">
                <input type="password" id="confirmNewPassword" placeholder="Confirm New Password">

                <button id="updatePasswordBtn">Update Password</button>
            </div>
            </div>
        </div>
    </div>
    
    <!-- ACTION BUTTONS -->
    <div class="buttons-row">
        <button id="saveBtn" class="account-btn save-btn">Save</button>
        <button id="logoutBtn" class="account-btn logout-btn">Log Out</button>
    </div>
</div>
</div>

</body>
</html>
