<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FINDME | Recent Claims</title>
    <link rel="stylesheet" href="../css/recent-claim.css">
</head>
<body>

<header class="navbar">
    <div class="logo-section">
        <div class="logo-circle">
            <img src="../assets/images/logo.jpg" alt="Logo">
        </div>
        <h1 class="logo-text">FINDME</h1>
    </div>

    <div class="nav-icons">
        <span class="notification">🔔</span>
        <img src="../assets/images/profile.jpg" class="profile-icon" id="profileBtn">
    </div>
</header>

<div class="main-container">

    <div class="action-row">
        <div class="left-actions">
            <button id="reportLostBtn" class="primary-btn">Lost Item Reports</button>
            <button id="reportFoundBtn" class="primary-btn">Report Found Item</button>
        </div>

        <div class="search-filter">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search">
            </div>
            <button id="filterBtn">Filter</button>
        </div>
    </div>

    <h2 class="section-title">Recent Claim Request</h2>

    <div id="itemsContainer"></div>

</div>

<!-- MODAL -->
<div id="claimModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <button class="modal-close" id="modalClose">&times;</button>
        <div class="modal-content">
            <div class="modal-image-wrap">
                <img id="modalImage" src="" alt="Item Image">
            </div>
            <div class="modal-details">
                <h2 class="modal-title">Claim Request Details</h2>
                <div id="modalBody"></div>
            </div>
        </div>
    </div>
</div>

<script src="../js/admin-claim-request.js"></script>
</body>
</html>
