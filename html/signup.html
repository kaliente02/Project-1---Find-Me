<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="../css/signup.css">

    <!-- Firebase initialization -->
    <script type="module" src="register.js" defer></script>

    <!-- Your signup code as a module -->
    <script type="module" src="../js/signup.js" defer></script>
</head>
<body>
    <div class="form-container">
        <h2>Create an Account</h2>
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="Enter your full name">

        <label for="idNumber">ID Number</label>
        <input type="text" id="idNumber" placeholder="Enter your ID number">

        <label for="signupEmail">Email</label>
        <input type="email" id="signupEmail" placeholder="Enter your email">

        <label for="signupPassword">Password</label>
        <input type="password" id="signupPassword" placeholder="Enter password">

        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm password">

        <button id="signupBtn">Sign Up</button>
        <p id="signupMsg" class="message"></p>
        <p class="switch-link">Already have an account? <a href="login.html">Log In</a></p>
    </div>
</body>
</html>
